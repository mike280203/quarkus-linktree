quarkus.application.name=quarkus-linktree

# HTTP
quarkus.http.port=8080

# Qute / Renarde
quarkus.qute.content-types.html=text/html;charset=UTF-8

# Database: H2 for local development
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/linktree;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate ORM
# During development we recreate the schema on every restart.
# Later, for production, we will replace this with migrations.
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Disable Docker-based Dev Services because we use local H2 for development
quarkus.devservices.enabled=false

