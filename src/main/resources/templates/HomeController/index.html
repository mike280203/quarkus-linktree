<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike Links</title>
</head>
<body>
    <main>
        <h1>Mike</h1>
        <p>Meine Links</p>

        <section>
            {#if links.size > 0}
                {#for link in links}
                    <article>
                        <h2>{link.title}</h2>
                        <p>{link.description}</p>
                        <a href="{link.url}" target="_blank" rel="noopener noreferrer">
                            Öffnen
                        </a>
                    </article>
                {/for}
            {#else}
                <p>Keine Links vorhanden</p>
            {/if}
        </section>
    </main>
</body>
</html>
